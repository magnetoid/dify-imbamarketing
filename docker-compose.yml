services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: dify
      POSTGRES_PASSWORD: "knWJHIXH5xY5Qu1fy8HJADh2Nb2mUVU8"
      POSTGRES_DB: dify
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - dify-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-h", "localhost", "-U", "dify", "-d", "dify"]
      interval: 10s
      timeout: 5s
      retries: 30
    networks:
      - dify-net

  redis:
    image: redis:6-alpine
    restart: unless-stopped
    command: redis-server --requirepass "dify_redis_3053cf79f02eac067635cabd"
    volumes:
      - dify-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "dify_redis_3053cf79f02eac067635cabd", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    networks:
      - dify-net

  sandbox:
    image: langgenius/dify-sandbox:0.2.12
    restart: unless-stopped
    environment:
      API_KEY: "dify_sandbox_3c96ea3ecd8387f94c2ad4df"
      GIN_MODE: release
      WORKER_TIMEOUT: "15"
      ENABLE_NETWORK: "true"
      HTTP_PROXY: "http://ssrf-proxy:3128"
      HTTPS_PROXY: "http://ssrf-proxy:3128"
    networks:
      - dify-net
      - ssrf-net

  ssrf-proxy:
    image: ubuntu/squid:latest
    restart: unless-stopped
    networks:
      - dify-net
      - ssrf-net

  plugin-daemon:
    image: langgenius/dify-plugin-daemon:0.5.3-local
    restart: unless-stopped
    environment:
      DB_TYPE: postgresql
      DB_USERNAME: dify
      DB_PASSWORD: "knWJHIXH5xY5Qu1fy8HJADh2Nb2mUVU8"
      DB_HOST: db
      DB_PORT: "5432"
      DB_DATABASE: dify_plugin
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: "dify_redis_3053cf79f02eac067635cabd"
      SERVER_PORT: "5002"
      SERVER_KEY: "fEQxAJCqqnV70H_7fqbQiLCPLz6HM3Km_d8REp4KTKOkoew9tfrWUw"
      DIFY_INNER_API_URL: "http://api:5001"
      DIFY_INNER_API_KEY: "Bjwde9gCyuhkg3bEnkCtllXYKBKAhYjeYLwceY8cURnP124MDlaVfg"
      PLUGIN_STORAGE_TYPE: local
      PLUGIN_STORAGE_LOCAL_ROOT: /app/storage
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - dify-plugin-data:/app/storage
    networks:
      - dify-net

  api:
    image: langgenius/dify-api:1.13.0
    restart: unless-stopped
    environment:
      MODE: api
      SECRET_KEY: "71a296ef78e8b48b67dcab6228c40938591b4c4ba9416f1cd5f4075e63866d74"
      DB_USERNAME: dify
      DB_PASSWORD: "knWJHIXH5xY5Qu1fy8HJADh2Nb2mUVU8"
      DB_HOST: db
      DB_PORT: "5432"
      DB_DATABASE: dify
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: "dify_redis_3053cf79f02eac067635cabd"
      CELERY_BROKER_URL: "redis://:dify_redis_3053cf79f02eac067635cabd@redis:6379/1"
      MIGRATION_ENABLED: "true"
      STORAGE_TYPE: opendal
      OPENDAL_SCHEME: fs
      OPENDAL_FS_ROOT: /app/api/storage
      CONSOLE_API_URL: "https://dify.imbamarketing.com"
      CONSOLE_WEB_URL: "https://dify.imbamarketing.com"
      SERVICE_API_URL: "https://dify.imbamarketing.com"
      APP_WEB_URL: "https://dify.imbamarketing.com"
      FILES_URL: "https://dify.imbamarketing.com"
      CODE_EXECUTION_ENDPOINT: "http://sandbox:8194"
      CODE_EXECUTION_API_KEY: "dify_sandbox_3c96ea3ecd8387f94c2ad4df"
      SSRF_PROXY_HTTP_URL: "http://ssrf-proxy:3128"
      SSRF_PROXY_HTTPS_URL: "http://ssrf-proxy:3128"
      PLUGIN_DAEMON_URL: "http://plugin-daemon:5002"
      PLUGIN_DAEMON_KEY: "fEQxAJCqqnV70H_7fqbQiLCPLz6HM3Km_d8REp4KTKOkoew9tfrWUw"
      PLUGIN_DIFY_INNER_API_KEY: "Bjwde9gCyuhkg3bEnkCtllXYKBKAhYjeYLwceY8cURnP124MDlaVfg"
      PLUGIN_DIFY_INNER_API_URL: "http://api:5001"
      WEB_API_CORS_ALLOW_ORIGINS: "*"
      CONSOLE_CORS_ALLOW_ORIGINS: "*"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - dify-storage:/app/api/storage
    networks:
      - dify-net
      - ssrf-net

  worker:
    image: langgenius/dify-api:1.13.0
    restart: unless-stopped
    environment:
      MODE: worker
      SECRET_KEY: "71a296ef78e8b48b67dcab6228c40938591b4c4ba9416f1cd5f4075e63866d74"
      DB_USERNAME: dify
      DB_PASSWORD: "knWJHIXH5xY5Qu1fy8HJADh2Nb2mUVU8"
      DB_HOST: db
      DB_PORT: "5432"
      DB_DATABASE: dify
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: "dify_redis_3053cf79f02eac067635cabd"
      CELERY_BROKER_URL: "redis://:dify_redis_3053cf79f02eac067635cabd@redis:6379/1"
      STORAGE_TYPE: opendal
      OPENDAL_SCHEME: fs
      OPENDAL_FS_ROOT: /app/api/storage
      CODE_EXECUTION_ENDPOINT: "http://sandbox:8194"
      CODE_EXECUTION_API_KEY: "dify_sandbox_3c96ea3ecd8387f94c2ad4df"
      SSRF_PROXY_HTTP_URL: "http://ssrf-proxy:3128"
      SSRF_PROXY_HTTPS_URL: "http://ssrf-proxy:3128"
      PLUGIN_DAEMON_URL: "http://plugin-daemon:5002"
      PLUGIN_DAEMON_KEY: "fEQxAJCqqnV70H_7fqbQiLCPLz6HM3Km_d8REp4KTKOkoew9tfrWUw"
      PLUGIN_DIFY_INNER_API_KEY: "Bjwde9gCyuhkg3bEnkCtllXYKBKAhYjeYLwceY8cURnP124MDlaVfg"
      PLUGIN_DIFY_INNER_API_URL: "http://api:5001"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - dify-storage:/app/api/storage
    networks:
      - dify-net
      - ssrf-net

  web:
    image: langgenius/dify-web:1.13.0
    restart: unless-stopped
    environment:
      CONSOLE_API_URL: "https://dify.imbamarketing.com"
      APP_API_URL: "https://dify.imbamarketing.com"
    networks:
      - dify-net

  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/proxy.conf:/etc/nginx/proxy.conf:ro
    depends_on:
      - api
      - web
    ports:
      - "127.0.0.1:9200:80"
    labels:
      - traefik.enable=true
      - "traefik.http.routers.dify-https.rule=Host(`dify.imbamarketing.com`)"
      - traefik.http.routers.dify-https.entrypoints=https
      - traefik.http.routers.dify-https.tls.certresolver=letsencrypt
      - traefik.http.routers.dify-https.service=dify-svc
      - traefik.http.services.dify-svc.loadbalancer.server.port=80
      - "traefik.http.routers.dify-http.rule=Host(`dify.imbamarketing.com`)"
      - traefik.http.routers.dify-http.entrypoints=http
      - traefik.http.routers.dify-http.middlewares=dify-https-redir
      - "traefik.http.middlewares.dify-https-redir.redirectscheme.scheme=https"
      - traefik.http.middlewares.dify-https-redir.redirectscheme.permanent=true
    networks:
      - dify-net
      - coolify

volumes:
  dify-db-data:
  dify-redis-data:
  dify-storage:
  dify-plugin-data:

networks:
  dify-net:
    driver: bridge
  ssrf-net:
    driver: bridge
    internal: true
  coolify:
    external: true
